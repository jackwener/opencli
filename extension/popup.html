<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #333;
      background: #fff;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .header img { width: 24px; height: 24px; }
    .header h1 { font-size: 15px; font-weight: 600; }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #f5f5f5;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.connected { background: #34c759; }
    .dot.disconnected { background: #ff3b30; }
    .dot.connecting { background: #ff9500; }
    .status-text { font-size: 13px; color: #555; }
    .status-text strong { color: #333; }
    .hint {
      margin-top: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      background: #f0f4ff;
      font-size: 11px;
      color: #666;
      line-height: 1.5;
      display: none;
    }
    .hint code {
      background: #e8ecf1;
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 11px;
    }
    .footer {
      margin-top: 14px;
      text-align: center;
      font-size: 11px;
      color: #999;
    }
    .footer a { color: #007aff; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon-48.png" alt="OpenCLI">
    <h1>OpenCLI</h1>
  </div>
  <div class="status-row">
    <span class="dot disconnected" id="dot"></span>
    <span class="status-text" id="status">Checking...</span>
  </div>
  <div class="hint" id="hint">
    This is normal. The extension connects automatically when you run any <code>opencli</code> command.
  </div>
  
  <div class="settings" style="margin-top: 14px; padding: 10px 12px; border-radius: 8px; background: #f9f9f9; border: 1px solid #eaeaea;">
    <div style="display: flex; align-items: center; justify-content: space-between;">
      <label for="portInput" style="font-size: 13px; font-weight: 500;">Daemon Port</label>
      <div style="display: flex; gap: 6px;">
        <input type="number" id="portInput" placeholder="19825" style="width: 65px; padding: 4px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; text-align: center;" />
        <button id="saveBtn" style="padding: 4px 10px; border: none; background: #007aff; color: #fff; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 500;">Save</button>
      </div>
    </div>
    <div id="portError" style="color: #ff3b30; font-size: 11px; margin-top: 6px; display: none;">Invalid port (1024-65535)</div>
  </div>

  <div class="footer">
    <a href="https://github.com/jackwener/opencli" target="_blank">Documentation</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
