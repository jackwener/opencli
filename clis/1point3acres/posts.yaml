site: 1point3acres
name: posts
description: 1Point3Acres thread posts (login required)
domain: api.1point3acres.com
strategy: cookie
browser: true

args:
  tid:
    type: str
    required: true
    positional: true
    description: Thread ID
  limit:
    type: int
    default: 20
    description: Number of posts
  page:
    type: int
    default: 1
    description: Page number

pipeline:
  - fetch:
      url: https://api.1point3acres.com/api/threads/${{ args.tid }}/posts
      method: POST
      params:
        ps: ${{ args.limit }}
        page: ${{ args.page }}

  - select: posts

  - map:
      floor: ${{ item.position || item.number || index + 1 }}
      pid: ${{ item.pid }}
      author: ${{ item.author || item.username || item.user?.username || item.user?.name || '' }}
      author_id: ${{ item.authorid || item.user?.uid || item.user_id || '' }}
      created_at: ${{ item.dateline || item.created_at || item.create_time || '' }}
      content: ${{ item.message || item.content || item.text || item.markdown || '' }}

columns: [floor, author, created_at, content]
