site: weather
name: wind
description: Wind forecast for a city
domain: api.open-meteo.com
strategy: public
browser: true

args:
  city:
    type: str
    required: true
    positional: true
    description: City name (e.g. Tokyo, London, "New York")
  hours:
    type: int
    default: 24
    description: Number of hours to show

pipeline:
  - navigate:
      url: https://open-meteo.com
      settleMs: 2000

  - evaluate: |
      (async () => {
        const city = ${{ args.city | json }};
        const hours = ${{ args.hours }};
        const geoRes = await fetch('https://geocoding-api.open-meteo.com/v1/search?name=' + encodeURIComponent(city) + '&count=1');
        const geoData = await geoRes.json();
        if (!geoData.results || geoData.results.length === 0) throw new Error('City not found: ' + city);
        const loc = geoData.results[0];
        const url = 'https://api.open-meteo.com/v1/forecast?latitude=' + loc.latitude + '&longitude=' + loc.longitude + '&hourly=wind_speed_10m,wind_direction_10m,wind_gusts_10m,wind_speed_80m,wind_direction_80m&forecast_hours=' + hours + '&timezone=auto';
        const res = await fetch(url);
        const data = await res.json();
        const h = data.hourly;
        const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
        function degToDir(deg) { return dirs[Math.round(deg / 22.5) % 16]; }
        const results = [];
        for (let i = 0; i < h.time.length && i < hours; i++) {
          results.push({
            time: h.time[i].replace('T', ' '),
            speed_kmh: h.wind_speed_10m[i],
            direction: degToDir(h.wind_direction_10m[i]),
            deg: h.wind_direction_10m[i],
            gusts_kmh: h.wind_gusts_10m[i],
            speed_80m: h.wind_speed_80m[i],
            dir_80m: degToDir(h.wind_direction_80m[i])
          });
        }
        return results;
      })()

columns: [time, speed_kmh, direction, gusts_kmh, speed_80m, dir_80m]
