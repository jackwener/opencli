site: weather
name: hourly
description: Hourly weather forecast for a city (next 24h)
domain: api.open-meteo.com
strategy: public
browser: true

args:
  city:
    type: str
    required: true
    positional: true
    description: City name (e.g. Tokyo, London, "New York")
  hours:
    type: int
    default: 24
    description: Number of hours to show

pipeline:
  - navigate:
      url: https://open-meteo.com
      settleMs: 2000

  - evaluate: |
      (async () => {
        const city = ${{ args.city | json }};
        const hours = ${{ args.hours }};
        const geoRes = await fetch('https://geocoding-api.open-meteo.com/v1/search?name=' + encodeURIComponent(city) + '&count=1');
        const geoData = await geoRes.json();
        if (!geoData.results || geoData.results.length === 0) throw new Error('City not found: ' + city);
        const loc = geoData.results[0];
        const url = 'https://api.open-meteo.com/v1/forecast?latitude=' + loc.latitude + '&longitude=' + loc.longitude + '&hourly=temperature_2m,apparent_temperature,precipitation_probability,precipitation,weather_code,wind_speed_10m,relative_humidity_2m&forecast_hours=' + hours + '&timezone=auto';
        const res = await fetch(url);
        const data = await res.json();
        const h = data.hourly;
        const codes = {0:'Clear',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Fog',48:'Rime fog',51:'Light drizzle',53:'Drizzle',55:'Dense drizzle',61:'Light rain',63:'Rain',65:'Heavy rain',71:'Light snow',73:'Snow',75:'Heavy snow',80:'Light showers',81:'Showers',82:'Heavy showers',95:'Thunderstorm'};
        const results = [];
        for (let i = 0; i < h.time.length && i < hours; i++) {
          results.push({
            time: h.time[i].replace('T', ' '),
            condition: codes[h.weather_code[i]] || ('Code ' + h.weather_code[i]),
            temp_c: h.temperature_2m[i],
            feels_c: h.apparent_temperature[i],
            humidity_pct: h.relative_humidity_2m[i],
            rain_pct: h.precipitation_probability[i],
            precip_mm: h.precipitation[i],
            wind_kmh: h.wind_speed_10m[i]
          });
        }
        return results;
      })()

columns: [time, condition, temp_c, feels_c, humidity_pct, rain_pct, wind_kmh]
