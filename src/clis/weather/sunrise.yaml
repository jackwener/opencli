site: weather
name: sunrise
description: Sunrise and sunset times for a city
domain: api.open-meteo.com
strategy: public
browser: true

args:
  city:
    type: str
    required: true
    positional: true
    description: City name (e.g. Tokyo, London, "New York")
  days:
    type: int
    default: 7
    description: Number of days to show

pipeline:
  - navigate:
      url: https://open-meteo.com
      settleMs: 2000

  - evaluate: |
      (async () => {
        const city = ${{ args.city | json }};
        const days = ${{ args.days }};
        const geoRes = await fetch('https://geocoding-api.open-meteo.com/v1/search?name=' + encodeURIComponent(city) + '&count=1');
        const geoData = await geoRes.json();
        if (!geoData.results || geoData.results.length === 0) throw new Error('City not found: ' + city);
        const loc = geoData.results[0];
        const url = 'https://api.open-meteo.com/v1/forecast?latitude=' + loc.latitude + '&longitude=' + loc.longitude + '&daily=sunrise,sunset,daylight_duration,uv_index_max&forecast_days=' + days + '&timezone=auto';
        const res = await fetch(url);
        const data = await res.json();
        const d = data.daily;
        const results = [];
        for (let i = 0; i < d.time.length; i++) {
          const dlHrs = (d.daylight_duration[i] / 3600).toFixed(1);
          results.push({
            date: d.time[i],
            sunrise: d.sunrise[i] ? d.sunrise[i].replace('T', ' ') : '-',
            sunset: d.sunset[i] ? d.sunset[i].replace('T', ' ') : '-',
            daylight_hrs: dlHrs,
            uv_index: d.uv_index_max[i]
          });
        }
        return results;
      })()

columns: [date, sunrise, sunset, daylight_hrs, uv_index]
