site: weather
name: precipitation
description: Precipitation forecast for a city
domain: api.open-meteo.com
strategy: public
browser: true

args:
  city:
    type: str
    required: true
    positional: true
    description: City name (e.g. Tokyo, London, "New York")
  days:
    type: int
    default: 7
    description: Number of forecast days

pipeline:
  - navigate:
      url: https://open-meteo.com
      settleMs: 2000

  - evaluate: |
      (async () => {
        const city = ${{ args.city | json }};
        const days = ${{ args.days }};
        const geoRes = await fetch('https://geocoding-api.open-meteo.com/v1/search?name=' + encodeURIComponent(city) + '&count=1');
        const geoData = await geoRes.json();
        if (!geoData.results || geoData.results.length === 0) throw new Error('City not found: ' + city);
        const loc = geoData.results[0];
        const url = 'https://api.open-meteo.com/v1/forecast?latitude=' + loc.latitude + '&longitude=' + loc.longitude + '&daily=precipitation_sum,rain_sum,snowfall_sum,precipitation_hours,precipitation_probability_max,weather_code&forecast_days=' + days + '&timezone=auto';
        const res = await fetch(url);
        const data = await res.json();
        const d = data.daily;
        const codes = {0:'Clear',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Fog',48:'Rime fog',51:'Light drizzle',53:'Drizzle',55:'Dense drizzle',61:'Light rain',63:'Rain',65:'Heavy rain',71:'Light snow',73:'Snow',75:'Heavy snow',80:'Light showers',81:'Showers',82:'Heavy showers',95:'Thunderstorm'};
        const results = [];
        for (let i = 0; i < d.time.length; i++) {
          results.push({
            date: d.time[i],
            condition: codes[d.weather_code[i]] || ('Code ' + d.weather_code[i]),
            total_mm: d.precipitation_sum[i],
            rain_mm: d.rain_sum[i],
            snow_cm: d.snowfall_sum[i],
            hours: d.precipitation_hours[i],
            probability: d.precipitation_probability_max[i]
          });
        }
        return results;
      })()

columns: [date, condition, total_mm, rain_mm, snow_cm, hours, probability]
