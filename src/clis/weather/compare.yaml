site: weather
name: compare
description: Compare current weather across multiple cities
domain: api.open-meteo.com
strategy: public
browser: true

args:
  cities:
    type: str
    required: true
    positional: true
    description: "Comma-separated city names (e.g. Tokyo,London,Paris)"

pipeline:
  - navigate:
      url: https://open-meteo.com
      settleMs: 2000

  - evaluate: |
      (async () => {
        const citiesStr = ${{ args.cities | json }};
        const cityNames = citiesStr.split(',').map(s => s.trim()).filter(Boolean);
        if (cityNames.length === 0) throw new Error('No cities provided');
        const codes = {0:'Clear',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Fog',48:'Rime fog',51:'Light drizzle',53:'Drizzle',55:'Dense drizzle',61:'Light rain',63:'Rain',65:'Heavy rain',71:'Light snow',73:'Snow',75:'Heavy snow',80:'Light showers',81:'Showers',82:'Heavy showers',95:'Thunderstorm'};
        const results = [];
        for (const name of cityNames) {
          const geoRes = await fetch('https://geocoding-api.open-meteo.com/v1/search?name=' + encodeURIComponent(name) + '&count=1');
          const geoData = await geoRes.json();
          if (!geoData.results || geoData.results.length === 0) {
            results.push({ city: name, country: '?', condition: 'Not found', temp_c: '-', humidity_pct: '-', wind_kmh: '-', precip_mm: '-' });
            continue;
          }
          const loc = geoData.results[0];
          const url = 'https://api.open-meteo.com/v1/forecast?latitude=' + loc.latitude + '&longitude=' + loc.longitude + '&current=temperature_2m,relative_humidity_2m,wind_speed_10m,precipitation,weather_code&timezone=auto';
          const res = await fetch(url);
          const data = await res.json();
          const c = data.current;
          results.push({
            city: loc.name,
            country: loc.country_code || '',
            condition: codes[c.weather_code] || ('Code ' + c.weather_code),
            temp_c: c.temperature_2m,
            humidity_pct: c.relative_humidity_2m,
            wind_kmh: c.wind_speed_10m,
            precip_mm: c.precipitation
          });
        }
        return results;
      })()

columns: [city, country, condition, temp_c, humidity_pct, wind_kmh, precip_mm]
