site: weather
name: air
description: Air quality index for a city
domain: air-quality-api.open-meteo.com
browser: true

args:
  city:
    type: str
    required: true
    positional: true
    description: City name

pipeline:
  - navigate:
      url: https://open-meteo.com
      settleMs: 2000

  - evaluate: |
      (async () => {
        const city = ${{ args.city | json }};
        const geoRes = await fetch('https://geocoding-api.open-meteo.com/v1/search?name=' + encodeURIComponent(city) + '&count=1');
        const geo = await geoRes.json();
        if (!geo.results || geo.results.length === 0) throw new Error('City not found: ' + city);
        const loc = geo.results[0];
        const res = await fetch('https://air-quality-api.open-meteo.com/v1/air-quality?latitude=' + loc.latitude + '&longitude=' + loc.longitude + '&current=us_aqi,pm2_5,pm10,carbon_monoxide,nitrogen_dioxide,ozone');
        const d = await res.json();
        const c = d.current;
        var level = 'Good';
        if (c.us_aqi > 50) level = 'Moderate';
        if (c.us_aqi > 100) level = 'Unhealthy for Sensitive';
        if (c.us_aqi > 150) level = 'Unhealthy';
        if (c.us_aqi > 200) level = 'Very Unhealthy';
        if (c.us_aqi > 300) level = 'Hazardous';
        return [{
          city: loc.name,
          country: loc.country || '',
          aqi: c.us_aqi,
          level: level,
          pm25: c.pm2_5 + ' µg/m³',
          pm10: c.pm10 + ' µg/m³',
          ozone: c.ozone + ' µg/m³',
        }];
      })()

columns: [city, country, aqi, level, pm25, pm10, ozone]
