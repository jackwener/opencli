site: weather
name: search
description: Search for cities (geocoding)
domain: geocoding-api.open-meteo.com
strategy: public
browser: false

args:
  query:
    type: str
    required: true
    positional: true
    description: City name to search
  limit:
    type: int
    default: 5
    description: Number of results

pipeline:
  - fetch:
      url: https://geocoding-api.open-meteo.com/v1/search?name=${{ args.query }}&count=${{ args.limit }}

  - select: results

  - map:
      rank: ${{ index + 1 }}
      name: ${{ item.name }}
      country: ${{ item.country }}
      admin: ${{ item.admin1 }}
      latitude: ${{ item.latitude }}
      longitude: ${{ item.longitude }}
      elevation: ${{ item.elevation }}
      timezone: ${{ item.timezone }}
      population: ${{ item.population }}

  - limit: ${{ args.limit }}

columns: [rank, name, country, admin, latitude, longitude, elevation, timezone, population]
