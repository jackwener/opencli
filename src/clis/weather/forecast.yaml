site: weather
name: forecast
description: 7-day weather forecast for a city
domain: api.open-meteo.com
strategy: public
browser: true

args:
  city:
    type: str
    required: true
    positional: true
    description: City name (e.g. Tokyo, London, "New York")
  days:
    type: int
    default: 7
    description: Number of forecast days (1-16)

pipeline:
  - navigate:
      url: https://open-meteo.com
      settleMs: 2000

  - evaluate: |
      (async () => {
        const city = ${{ args.city | json }};
        const days = ${{ args.days }};
        const geoRes = await fetch('https://geocoding-api.open-meteo.com/v1/search?name=' + encodeURIComponent(city) + '&count=1');
        const geoData = await geoRes.json();
        if (!geoData.results || geoData.results.length === 0) throw new Error('City not found: ' + city);
        const loc = geoData.results[0];
        const url = 'https://api.open-meteo.com/v1/forecast?latitude=' + loc.latitude + '&longitude=' + loc.longitude + '&daily=temperature_2m_max,temperature_2m_min,apparent_temperature_max,apparent_temperature_min,precipitation_sum,precipitation_probability_max,wind_speed_10m_max,weather_code&forecast_days=' + days + '&timezone=auto';
        const res = await fetch(url);
        const data = await res.json();
        const d = data.daily;
        const codes = {0:'Clear',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Fog',48:'Rime fog',51:'Light drizzle',53:'Drizzle',55:'Dense drizzle',61:'Light rain',63:'Rain',65:'Heavy rain',71:'Light snow',73:'Snow',75:'Heavy snow',80:'Light showers',81:'Showers',82:'Heavy showers',95:'Thunderstorm',96:'Thunderstorm w/ hail',99:'Heavy thunderstorm w/ hail'};
        const results = [];
        for (let i = 0; i < d.time.length; i++) {
          results.push({
            date: d.time[i],
            condition: codes[d.weather_code[i]] || ('Code ' + d.weather_code[i]),
            high_c: d.temperature_2m_max[i],
            low_c: d.temperature_2m_min[i],
            precip_mm: d.precipitation_sum[i],
            rain_pct: d.precipitation_probability_max[i],
            wind_kmh: d.wind_speed_10m_max[i]
          });
        }
        return results;
      })()

columns: [date, condition, high_c, low_c, precip_mm, rain_pct, wind_kmh]
