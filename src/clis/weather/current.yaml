site: weather
name: current
description: Current weather for a city
domain: api.open-meteo.com
strategy: public
browser: true

args:
  city:
    type: str
    required: true
    positional: true
    description: City name (e.g. Tokyo, London, "New York")

pipeline:
  - navigate:
      url: https://open-meteo.com
      settleMs: 2000

  - evaluate: |
      (async () => {
        const city = ${{ args.city | json }};
        const geoRes = await fetch('https://geocoding-api.open-meteo.com/v1/search?name=' + encodeURIComponent(city) + '&count=1');
        const geoData = await geoRes.json();
        if (!geoData.results || geoData.results.length === 0) throw new Error('City not found: ' + city);
        const loc = geoData.results[0];
        const lat = loc.latitude;
        const lon = loc.longitude;
        const url = 'https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lon + '&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,wind_direction_10m,pressure_msl,precipitation,weather_code&timezone=auto';
        const res = await fetch(url);
        const data = await res.json();
        const c = data.current;
        const codes = {0:'Clear',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Fog',48:'Rime fog',51:'Light drizzle',53:'Drizzle',55:'Dense drizzle',61:'Light rain',63:'Rain',65:'Heavy rain',66:'Freezing rain',67:'Heavy freezing rain',71:'Light snow',73:'Snow',75:'Heavy snow',77:'Snow grains',80:'Light showers',81:'Showers',82:'Heavy showers',85:'Light snow showers',86:'Heavy snow showers',95:'Thunderstorm',96:'Thunderstorm w/ hail',99:'Heavy thunderstorm w/ hail'};
        return [{
          city: loc.name,
          country: loc.country_code || '',
          condition: codes[c.weather_code] || ('Code ' + c.weather_code),
          temp_c: c.temperature_2m,
          feels_like_c: c.apparent_temperature,
          humidity_pct: c.relative_humidity_2m,
          wind_kmh: c.wind_speed_10m,
          wind_dir: c.wind_direction_10m,
          pressure_hpa: c.pressure_msl,
          precip_mm: c.precipitation,
          timezone: data.timezone
        }];
      })()

columns: [city, country, condition, temp_c, feels_like_c, humidity_pct, wind_kmh, pressure_hpa]
