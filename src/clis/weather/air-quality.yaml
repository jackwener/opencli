site: weather
name: air-quality
description: Current air quality index for a city
domain: air-quality-api.open-meteo.com
strategy: public
browser: true

args:
  city:
    type: str
    required: true
    positional: true
    description: City name (e.g. Tokyo, London, "New York")

pipeline:
  - navigate:
      url: https://open-meteo.com
      settleMs: 2000

  - evaluate: |
      (async () => {
        const city = ${{ args.city | json }};
        const geoRes = await fetch('https://geocoding-api.open-meteo.com/v1/search?name=' + encodeURIComponent(city) + '&count=1');
        const geoData = await geoRes.json();
        if (!geoData.results || geoData.results.length === 0) throw new Error('City not found: ' + city);
        const loc = geoData.results[0];
        const url = 'https://air-quality-api.open-meteo.com/v1/air-quality?latitude=' + loc.latitude + '&longitude=' + loc.longitude + '&current=us_aqi,european_aqi,pm10,pm2_5,carbon_monoxide,nitrogen_dioxide,sulphur_dioxide,ozone';
        const res = await fetch(url);
        const data = await res.json();
        const c = data.current;
        const aqi = c.us_aqi;
        let level = 'Good';
        if (aqi > 300) level = 'Hazardous';
        else if (aqi > 200) level = 'Very Unhealthy';
        else if (aqi > 150) level = 'Unhealthy';
        else if (aqi > 100) level = 'Unhealthy for Sensitive';
        else if (aqi > 50) level = 'Moderate';
        return [{
          city: loc.name,
          country: loc.country_code || '',
          us_aqi: c.us_aqi,
          eu_aqi: c.european_aqi,
          level: level,
          pm2_5: c.pm2_5,
          pm10: c.pm10,
          ozone: c.ozone,
          no2: c.nitrogen_dioxide,
          so2: c.sulphur_dioxide,
          co: c.carbon_monoxide
        }];
      })()

columns: [city, country, us_aqi, eu_aqi, level, pm2_5, pm10, ozone, no2, so2]
