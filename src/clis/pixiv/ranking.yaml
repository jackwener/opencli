site: pixiv
name: ranking
description: Pixiv illustration rankings (daily/weekly/monthly)
domain: www.pixiv.net
strategy: cookie
browser: true

args:
  mode:
    type: str
    default: daily
    description: Ranking mode
    choices: [daily, weekly, monthly, rookie, original, male, female, daily_r18, weekly_r18]
  page:
    type: int
    default: 1
    description: Page number
  limit:
    type: int
    default: 20
    description: Number of results

pipeline:
  - navigate: https://www.pixiv.net

  - evaluate: |
      (async () => {
        const mode = ${{ args.mode | json }};
        const page = ${{ args.page }};
        const limit = ${{ args.limit }};
        const res = await fetch(
          'https://www.pixiv.net/ajax/ranking?mode=' + mode + '&p=' + page + '&format=json',
          { credentials: 'include' }
        );
        if (!res.ok) throw new Error('HTTP ' + res.status + ' — make sure you are logged in to Pixiv');
        const data = await res.json();
        const items = (data?.body?.contents || []).slice(0, limit);
        return items.map((item, i) => ({
          rank: item.rank,
          title: item.title,
          author: item.user_name,
          user_id: item.user_id,
          illust_id: item.illust_id,
          pages: item.illust_page_count,
          bookmarks: item.rating_count,
          url: 'https://www.pixiv.net/artworks/' + item.illust_id
        }));
      })()

columns: [rank, title, author, illust_id, pages, bookmarks]
