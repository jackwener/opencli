site: pixiv
name: detail
description: View illustration details (tags, stats, URLs)
domain: www.pixiv.net
strategy: cookie
browser: true

args:
  illust-id:
    type: str
    required: true
    positional: true
    description: Illustration ID

pipeline:
  - navigate: https://www.pixiv.net

  - evaluate: |
      (async () => {
        const id = ${{ args['illust-id'] | json }};
        const res = await fetch(
          'https://www.pixiv.net/ajax/illust/' + id,
          { credentials: 'include' }
        );
        if (!res.ok) throw new Error('HTTP ' + res.status + ' — make sure you are logged in to Pixiv');
        const data = await res.json();
        const b = data?.body;
        if (!b) throw new Error('Illustration not found');
        return [{
          illust_id: b.illustId,
          title: b.illustTitle,
          author: b.userName,
          user_id: b.userId,
          type: b.illustType === 0 ? 'illust' : b.illustType === 1 ? 'manga' : b.illustType === 2 ? 'ugoira' : String(b.illustType),
          pages: b.pageCount,
          bookmarks: b.bookmarkCount,
          likes: b.likeCount,
          views: b.viewCount,
          tags: (b.tags?.tags || []).map(t => t.tag).join(', '),
          created: b.createDate?.split('T')[0] || '',
          url: 'https://www.pixiv.net/artworks/' + b.illustId
        }];
      })()

columns: [illust_id, title, author, type, pages, bookmarks, likes, views, tags, created]
