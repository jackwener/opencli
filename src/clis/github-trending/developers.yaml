site: github-trending
name: developers
description: Trending GitHub developers
domain: github.com
browser: true

args:
  since:
    type: str
    default: daily
    description: Time range
    choices: [daily, weekly, monthly]
  language:
    type: str
    default: ""
    description: "Programming language filter (e.g. python, javascript, rust)"
  limit:
    type: int
    default: 25
    description: Number of developers

pipeline:
  - navigate:
      url: https://github.com/trending/developers/${{ args.language }}?since=${{ args.since }}
      settleMs: 3000

  - evaluate: |
      (() => {
        const limit = ${{ args.limit }};
        const rows = document.querySelectorAll('article.Box-row');
        return Array.from(rows).slice(0, limit).map(function(row, i) {
          const nameEl = row.querySelector('h1.h3 a');
          const name = nameEl ? nameEl.textContent.trim() : '';
          const usernameEl = row.querySelector('p.f4 a');
          const username = usernameEl ? usernameEl.textContent.trim() : '';
          const repoEl = row.querySelector('h1.h4 a');
          const repo = repoEl ? repoEl.textContent.trim().replace(/\s+/g, '') : '';
          const repoDesc = row.querySelector('span.repo-snipt-description');
          const desc = repoDesc ? repoDesc.textContent.trim().substring(0, 80) : '';
          return {
            rank: i + 1,
            name: name || username,
            username: username || name,
            popular_repo: repo,
            description: desc,
          };
        });
      })()

columns: [rank, name, username, popular_repo, description]
