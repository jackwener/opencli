site: github-trending
name: repos
description: Trending GitHub repositories
domain: github.com
browser: true

args:
  since:
    type: str
    default: daily
    description: Time range
    choices: [daily, weekly, monthly]
  language:
    type: str
    default: ""
    description: "Programming language filter (e.g. python, javascript, rust, go)"
  limit:
    type: int
    default: 25
    description: Number of repos

pipeline:
  - navigate:
      url: https://github.com/trending/${{ args.language }}?since=${{ args.since }}
      settleMs: 3000

  - evaluate: |
      (() => {
        const limit = ${{ args.limit }};
        const rows = document.querySelectorAll('article.Box-row');
        return Array.from(rows).slice(0, limit).map(function(row, i) {
          const nameEl = row.querySelector('h2 a');
          const name = nameEl ? nameEl.textContent.trim().replace(/\s+/g, '') : '';
          const descEl = row.querySelector('p.col-9');
          const desc = descEl ? descEl.textContent.trim().substring(0, 100) : '';
          const langEl = row.querySelector('[itemprop="programmingLanguage"]');
          const lang = langEl ? langEl.textContent.trim() : '';
          const starsEls = row.querySelectorAll('a.Link--muted');
          const stars = starsEls[0] ? starsEls[0].textContent.trim() : '';
          const forks = starsEls[1] ? starsEls[1].textContent.trim() : '';
          const todayEl = row.querySelector('span.d-inline-block.float-sm-right');
          const today = todayEl ? todayEl.textContent.trim() : '';
          return {
            rank: i + 1,
            repo: name,
            description: desc,
            language: lang,
            stars: stars,
            forks: forks,
            today: today,
          };
        });
      })()

columns: [rank, repo, language, stars, forks, today, description]
