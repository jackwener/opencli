site: tgb
name: post
description: 抓取淘股吧帖子正文
domain: tgb.cn
strategy: cookie
browser: true

args:
  url:
    type: str
    required: true
    description: 帖子URL

pipeline:
  - navigate: ${{ args.url }}
  - evaluate: |
      (async () => {
        // fetch 获取 HTML
        const res = await fetch(window.location.href, {
          credentials: 'include'
        });
        const html = await res.text();
        
        // 从 gioMsg 提取主题/标题（优先）
        const subjectMatch = html.match(/id="gioMsg"[^>]*subject\s*=\s*"([^"]+)"/);
        let title = subjectMatch ? subjectMatch[1].trim() : '';
        
        // 备选：从 title 标签提取
        if (!title) {
          const titleMatch = html.match(/<title>([^<]+)<\/title>/);
          if (titleMatch) {
            title = titleMatch[1].replace(/_.*$/, '').trim();
          }
        }
        
        // 从 gioMsg 提取作者信息
        const gioMatch = html.match(/id="gioMsg"[^>]*userName="([^"]+)"/);
        const author = gioMatch ? gioMatch[1] : '';
        
        // 提取时间 - 在 article-data 中
        const timeMatch = html.match(/(\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2})/);
        const publishTime = timeMatch ? timeMatch[1] : '';
        
        // 提取浏览数
        const viewMatch = html.match(/浏览\s+(\d+)/);
        const views = viewMatch ? viewMatch[1] : '';
        
        // 提取评论数
        const commentMatch = html.match(/评论\s+(\d+)/);
        const comments = commentMatch ? commentMatch[1] : '';
        
        // 提取正文内容 - 在 article-text p_coten 中
        let contentHtml = '';
        
        // 方法1: 匹配 article-text 到 videoImg
        const contentMatch1 = html.match(/<div class="article-text[^"]*"[^>]*>([\s\S]*?)<div id="videoImg"/);
        if (contentMatch1) {
          contentHtml = contentMatch1[1];
        } else {
          // 方法2: 匹配 article-text 到其闭合标签
          const contentMatch2 = html.match(/<div class="article-text[^"]*"[^>]*>([\s\S]*?)<\/div>\s*<div style="background:/);
          if (contentMatch2) {
            contentHtml = contentMatch2[1];
          } else {
            // 方法3: 直接查找 article-text 的内容
            const contentMatch3 = html.match(/<div class="article-text[^"]*"[^>]*>([\s\S]*?)<\/div>/);
            if (contentMatch3) {
              contentHtml = contentMatch3[1];
            }
          }
        }
        
        // 清理 HTML 标签，提取纯文本段落
        const paragraphs = [];
        if (contentHtml) {
          // 将 <br> 转换为换行
          const text = contentHtml
            .replace(/<br\s*\/?>/gi, '\n')
            .replace(/<a[^>]*>/gi, '')  // 移除链接标签开始
            .replace(/<\/a>/gi, '')     // 移除链接标签结束
            .replace(/<[^>]+>/g, '')    // 移除其他 HTML 标签
            .replace(/&nbsp;/g, ' ')
            .replace(/&amp;/g, '&')
            .replace(/&lt;/g, '<')
            .replace(/&gt;/g, '>')
            .replace(/&quot;/g, '"');
          
          // 按空行分割段落
          const lines = text.split('\n');
          for (const line of lines) {
            const para = line.trim();
            if (para && para.length > 0) {
              paragraphs.push(para);
            }
          }
        }
        
        // 生成 markdown
        const mdLines = [
          `# ${title || '无标题'}`,
          '',
          `> **作者**: ${author || '未知'}`,
          `> **发布时间**: ${publishTime || '未知'}`,
          `> **浏览**: ${views || '-'} | **评论**: ${comments || '-'}`,
          `> **原文**: ${window.location.href}`,
          '',
          '---',
          ''
        ];
        
        for (const para of paragraphs) {
          const clean = para.replace(/\s+/g, ' ').trim();
          if (clean) {
            mdLines.push(clean);
            mdLines.push('');
          }
        }
        
        return {
          title: title || '无标题',
          author: author || '未知',
          publish_time: publishTime || '未知',
          views: views,
          comments: comments,
          url: window.location.href,
          paragraphs: paragraphs.length,
          markdown: mdLines.join('\n')
        };
      })()

columns: [title, author, publish_time, views, comments, paragraphs]
