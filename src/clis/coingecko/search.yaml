site: coingecko
name: search
description: Search for cryptocurrencies on CoinGecko
domain: api.coingecko.com
strategy: public
browser: false

args:
  query:
    type: str
    required: true
    positional: true
    description: Search query
  limit:
    type: int
    default: 10
    description: Number of results

pipeline:
  - fetch:
      url: https://api.coingecko.com/api/v3/search?query=${{ args.query }}

  - select: coins

  - map:
      rank: ${{ index + 1 }}
      name: ${{ item.name }}
      symbol: ${{ item.symbol }}
      cap_rank: ${{ item.market_cap_rank }}

  - limit: ${{ args.limit }}

columns: [rank, name, symbol, cap_rank]
