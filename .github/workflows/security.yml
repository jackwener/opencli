name: Security Audit

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    - cron: '0 9 * * 1'  # Weekly Monday 09:00 UTC

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit (production)
        run: npm audit --omit=dev --audit-level=high

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Verify lockfiles exist
        run: |
          test -f package-lock.json || { echo "missing root package-lock.json"; exit 1; }
          test -f extension/package-lock.json || { echo "missing extension/package-lock.json"; exit 1; }
          echo "both lockfiles present"

      - name: Verify direct deps use exact pins (no ^ or ~)
        run: node scripts/audit/check-exact-pins.mjs

      - name: Verify lockfile provenance — root (registry + SHA-512)
        run: node scripts/audit/check-lockfile-provenance.mjs

      - name: Verify lockfile provenance — extension
        run: node scripts/audit/check-lockfile-provenance.mjs extension

      - name: 90-day rule — root (direct strict, transitive warn)
        run: node scripts/audit/check-dep-age.mjs

      - name: 90-day rule — extension (direct strict, transitive warn)
        run: node scripts/audit/check-dep-age.mjs extension

      # Block any NEW <90d transitive dep introduced vs the PR base. Only
      # runs on pull_request because push events don't have a meaningful
      # base to diff against. The bootstrap PR that introduced this audit
      # established the lockfile baseline; from the next PR onwards every
      # NEW transitive entry under 90d will fail the build.
      - name: 90-day rule — root (block new <90d transitive vs base)
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --depth=1 origin "$BASE"
          node scripts/audit/check-dep-age.mjs --strict-new-transitive --base-ref "origin/$BASE"
        env:
          BASE: ${{ github.base_ref }}

      - name: 90-day rule — extension (block new <90d transitive vs base)
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --depth=1 origin "$BASE"
          node scripts/audit/check-dep-age.mjs extension --strict-new-transitive --base-ref "origin/$BASE"
        env:
          BASE: ${{ github.base_ref }}
